<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Kerja - MySPD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background: #020617; margin: 0; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        .manual-box { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(59, 130, 246, 0.2); border-left: 5px solid #3b82f6; }
        .manual-box:hover { border-left-color: #60a5fa; background: rgba(30, 58, 138, 0.2); }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <a href="/portal-dokumen-rasmi/" class="text-blue-500 hover:text-white font-mono text-xs mb-10 inline-flex items-center gap-2 transition-colors">
            <i class="fas fa-arrow-left"></i> [ BALIK KE PORTAL DOKUMEN ]
        </a>
        <h2 class="font-['Orbitron'] text-2xl font-bold text-white mb-8 uppercase tracking-widest"><i class="fas fa-book-open text-blue-500 mr-3"></i>Manual Kerja Sektor</h2>

        <div class="space-y-4">
            <div class="manual-box p-6 rounded-r-lg flex justify-between items-center group cursor-pointer">
                <div>
                    <span class="block font-bold text-white uppercase">Manual Penawanan Data Versi 2.0</span>
                    <span class="text-[10px] text-blue-400 font-mono tracking-widest">REF: SPD-MK-2026-001</span>
                </div>
                <i class="fas fa-file-pdf text-blue-500 group-hover:scale-125 transition-transform"></i>
            </div>
        </div>
    </div>
</body>
</html>
