<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minit Mesyuarat - MySPD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background: #020617; margin: 0; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
        
        .doc-item { background: rgba(30, 58, 138, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); transition: 0.3s; text-decoration: none; display: flex; justify-content: space-between; align-items: center; padding: 1.25rem; border-radius: 0.25rem; }
        
        .pdf-scanner-frame { background: rgba(15, 23, 42, 0.9); border: 1px solid #3b82f6; border-radius: 8px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); overflow: hidden; height: 65vh; position: relative; width: 100%; }
        .frame-header { background: #1e3a8a; padding: 8px 16px; font-family: 'Orbitron', sans-serif; font-size: 12px; color: #93c5fd; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3b82f6; }
        
        /* Gaya untuk butang pilihan yang aktif */
        .btn-pilih { transition: all 0.3s ease; cursor: pointer; }
        .btn-pilih:hover { background: rgba(59, 130, 246, 0.3); border-color: #60a5fa; }
        .btn-pilih:focus { background: rgba(59, 130, 246, 0.5); color: white; border-color: #93c5fd; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-6 text-center">
    <div class="max-w-5xl mx-auto">

        <div class="text-left">
            <a href="/portal-dokumen-rasmi/" class="text-blue-500 hover:text-white font-mono text-xs mb-8 inline-flex items-center gap-2 transition-colors">
                <i class="fas fa-arrow-left"></i> [ BALIK KE PORTAL DOKUMEN ]
            </a>
        </div>

        <h2 class="font-['Orbitron'] text-3xl font-bold text-white mb-6 uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500 text-left">
            <i class="fas fa-file-invoice text-blue-500 mr-3"></i>Minit Mesyuarat 2026
        </h2>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 text-left">
            <button onclick="tukarDokumen('1BV1J2Uxg9RSlKAPzmtFzarq9d5LmzLl2', '01. MINIT MESYUARAT BIL 1/2026', '27 FEB 2026')" class="btn-pilih border border-blue-500/50 text-blue-300 p-2 rounded font-mono text-xs bg-blue-900/20 text-center uppercase">
                <i class="fas fa-folder-open mr-1"></i> Bil 1/2026
            </button>
            
            <button onclick="tukarDokumen('1xw_MnCvLPbHZboV3Dwpiu7bHB_qZH6S-', '02. MINIT MESYUARAT BIL 2/2026', '12 MAC 2026')" class="btn-pilih border border-blue-500/50 text-blue-300 p-2 rounded font-mono text-xs bg-blue-900/20 text-center uppercase">
                <i class="fas fa-folder mr-1"></i> Bil 2/2026
            </button>

            <button onclick="tukarDokumen('LETAK_ID_DRIVE_SINI_NANTI', '03. MINIT MESYUARAT BIL 3/2026', 'BELUM DILAKSANAKAN')" class="btn-pilih border border-blue-500/50 text-slate-500 p-2 rounded font-mono text-xs bg-blue-900/10 text-center uppercase">
                <i class="fas fa-lock mr-1"></i> Bil 3/2026
            </button>

            <button onclick="tukarDokumen('LETAK_ID_DRIVE_SINI_NANTI', '04. MINIT MESYUARAT BIL 4/2026', 'BELUM DILAKSANAKAN')" class="btn-pilih border border-blue-500/50 text-slate-500 p-2 rounded font-mono text-xs bg-blue-900/10 text-center uppercase">
                <i class="fas fa-lock mr-1"></i> Bil 4/2026
            </button>
        </div>

        <div class="doc-item group mb-6">
            <div class="text-left">
                <span id="tajuk-paparan" class="block font-bold text-blue-100 uppercase tracking-tighter text-lg transition-all duration-300">01. MINIT MESYUARAT BIL 1/2026</span>
                <span id="tarikh-paparan" class="text-[10px] text-slate-400 font-mono mt-1 block">STATUS: DISAHKAN | TARIKH: 27 FEB 2026</span>
            </div>
            <a id="link-buka-penuh" href="https://drive.google.com/file/d/1BV1J2Uxg9RSlKAPzmtFzarq9d5LmzLl2/view?usp=sharing" target="_blank" class="text-[10px] font-mono border border-blue-500/50 hover:bg-blue-600/30 text-blue-400 px-3 py-1.5 rounded transition-all">
                <i class="fas fa-external-link-alt mr-1"></i> BUKA PENUH
            </a>
        </div>

        <div class="pdf-scanner-frame text-left">
            <div class="frame-header">
                <span id="header-source">SOURCE: GOOGLE_DRIVE_SECURE_LINK // NODE_01</span>
                <span class="text-green-400 animate-pulse">STATUS: LIVE_VIEW</span>
            </div>
            <iframe id="paparan-iframe" src="https://drive.google.com/file/d/1BV1J2Uxg9RSlKAPzmtFzarq9d5LmzLl2/preview" width="100%" height="100%" style="border: none;" allow="autoplay"></iframe>
        </div>

    </div>

    <script>
        function tukarDokumen(driveId, tajuk, tarikh) {
            // 1. Tukar fail dalam Iframe
            if(driveId === 'LETAK_ID_DRIVE_SINI_NANTI') {
                document.getElementById('paparan-iframe').src = ''; // Kosongkan kalau takda fail
                document.getElementById('tajuk-paparan').innerText = tajuk + " (TIADA FAIL)";
            } else {
                document.getElementById('paparan-iframe').src = `https://drive.google.com/file/d/${driveId}/preview`;
                document.getElementById('tajuk-paparan').innerText = tajuk;
            }

            // 2. Tukar Tarikh & Info
            document.getElementById('tarikh-paparan').innerText = `STATUS: DIKEMASKINI | TARIKH: ${tarikh}`;
            
            // 3. Tukar link butang 'BUKA PENUH'
            document.getElementById('link-buka-penuh').href = `https://drive.google.com/file/d/${driveId}/view?usp=sharing`;
            
            // 4. Tukar teks header sikit bagi nampak canggih
            document.getElementById('header-source').innerText = `SOURCE: GOOGLE_DRIVE_SECURE_LINK // REFRESHED`;
        }
    </script>
</body>
</html>
