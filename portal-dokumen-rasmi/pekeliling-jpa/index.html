<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pekeliling JPA - MySPD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background: #020617; margin: 0; }
        .jpa-card { background: rgba(255, 255, 255, 0.03); border-top: 4px solid #d4af37; backdrop-filter: blur(10px); }
        .link-item { border-bottom: 1px solid rgba(212, 175, 55, 0.1); transition: 0.3s; }
        .link-item:hover { background: rgba(212, 175, 55, 0.05); padding-left: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <a href="/portal-dokumen-rasmi/" class="text-slate-500 hover:text-white font-mono text-xs mb-10 inline-flex items-center gap-2 transition-colors">
            <i class="fas fa-arrow-left"></i> [ KEMBALI ]
        </a>
        
        <div class="jpa-card p-10 rounded-b-lg shadow-2xl border border-white/5">
            <h2 class="font-['Orbitron'] text-2xl font-bold mb-10 uppercase text-white tracking-widest border-b border-white/10 pb-4">Koleksi Pekeliling JPA</h2>
            <div class="space-y-2">
                <a href="https://myppsm.jpa.gov.my/" target="_blank" class="link-item p-6 flex justify-between items-center no-underline group">
                    <div>
                        <span class="block font-bold text-blue-400 group-hover:text-blue-300 uppercase tracking-tighter text-lg">Portal MyPPSM JPA</span>
                        <span class="text-xs text-slate-500 font-mono mt-1">Sistem Pengurusan Panduan Perkhidmatan Awam</span>
                    </div>
                    <i class="fas fa-external-link-alt text-slate-600 group-hover:text-[#d4af37] transition-colors"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
